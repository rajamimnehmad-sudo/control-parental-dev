name: Publicar APKs DEV

on:
  pull_request:
    paths:
      - ".github/workflows/publish-dev-updates.yml"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Confirmo que quiero publicar ambas APK en Supabase DEV"
        required: true
        default: false
        type: boolean
      confirm_same_version_repair:
        description: "Reparar excepcionalmente los artefactos de la misma version ya publicada"
        required: true
        default: false
        type: boolean

concurrency:
  group: publish-dev-updates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloud-preflight:
    if: ${{ github.event_name == 'pull_request' }}
    name: Validar publicador cloud sin publicar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.0

      - name: Validar CLI y scripts
        shell: bash
        run: |
          set -euo pipefail
          supabase --version
          bash -n scripts/publicar_dev.sh
          bash -n scripts/prepare_dev_updates.sh
          bash -n scripts/upload_dev_updates.sh

  publish-dev:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_publish }}
    name: Build, test y publicar DEV
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.0

      - name: Crear .env DEV desde secrets
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          UPDATE_MANIFEST_URL_USER: ${{ secrets.UPDATE_MANIFEST_URL_USER }}
          UPDATE_MANIFEST_URL_ADMIN: ${{ secrets.UPDATE_MANIFEST_URL_ADMIN }}
          FIREBASE_APPLICATION_ID: ${{ secrets.FIREBASE_APPLICATION_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL:-}" ]]; then
            echo "Falta secret SUPABASE_URL" >&2
            exit 1
          fi
          if [[ -z "${SUPABASE_ANON_KEY:-}" ]]; then
            echo "Falta secret SUPABASE_ANON_KEY" >&2
            exit 1
          fi
          for firebase_secret in FIREBASE_APPLICATION_ID FIREBASE_API_KEY FIREBASE_PROJECT_ID; do
            if [[ -z "${!firebase_secret:-}" ]]; then
              echo "Falta secret $firebase_secret" >&2
              exit 1
            fi
          done
          {
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            echo "UPDATE_MANIFEST_URL_USER=${UPDATE_MANIFEST_URL_USER:-}"
            echo "UPDATE_MANIFEST_URL_ADMIN=${UPDATE_MANIFEST_URL_ADMIN:-}"
            echo "UPDATE_MANIFEST_URL="
            echo "FIREBASE_APPLICATION_ID=$FIREBASE_APPLICATION_ID"
            echo "FIREBASE_API_KEY=$FIREBASE_API_KEY"
            echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID"
          } > .env

      - name: Autenticar Supabase CLI
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "Falta secret SUPABASE_ACCESS_TOKEN." >&2
            echo "Crealo en Supabase Account Access Tokens y guardalo en GitHub Actions Secrets." >&2
            exit 1
          fi
          supabase login --token "$SUPABASE_ACCESS_TOKEN" --name github-actions-dev

      - name: Preparar firma DEV estable
        shell: bash
        env:
          ANDROID_DEV_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEV_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_DEV_KEYSTORE_BASE64:-}" ]]; then
            echo "Falta secret ANDROID_DEV_KEYSTORE_BASE64" >&2
            exit 1
          fi
          printf '%s' "$ANDROID_DEV_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/dev-update.jks"
          chmod 600 "$RUNNER_TEMP/dev-update.jks"

      - name: Permisos de scripts
        shell: bash
        run: chmod +x ./gradlew scripts/*.sh

      - name: Publicar DEV
        shell: bash
        env:
          SUPABASE_PROJECT_REF: syeycayasyufedwoprea
          ANDROID_DEV_KEYSTORE_PATH: ${{ runner.temp }}/dev-update.jks
          ANDROID_DEV_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DEV_KEYSTORE_PASSWORD }}
          ANDROID_DEV_KEY_ALIAS: ${{ secrets.ANDROID_DEV_KEY_ALIAS }}
          ANDROID_DEV_KEY_PASSWORD: ${{ secrets.ANDROID_DEV_KEY_PASSWORD }}
          ALLOW_SAME_VERSION_REPAIR: ${{ inputs.confirm_same_version_repair }}
        run: scripts/publicar_dev.sh
